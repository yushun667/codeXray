<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeXray · 调用链图</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* ── App 外层容器（工具栏 + 画布） ── */
    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* ── 图画布容器 ── */
    #graph-container {
      flex: 1;
      width: 100%;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    /* G6 canvas 需要撑满容器 */
    #graph-container canvas {
      display: block;
    }

    /* ── 加载遮罩 ── */
    #cx-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.4);
      z-index: 100;
      color: #ccc;
      font-size: 14px;
      pointer-events: none;
    }
    #cx-loading.hidden {
      display: none;
    }

    /* ── 滚动条样式（Chromium） ── */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #555;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- 工具栏由 toolbar.ts 动态插入到 #app 顶部 -->

    <!-- 图画布 -->
    <div id="graph-container"></div>

    <!-- 加载遮罩（初始隐藏） -->
    <div id="cx-loading" class="hidden">正在渲染…</div>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
